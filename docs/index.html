<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gactorio — Energy Drink Factory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Gactorio</h1>
        <p>Energy Drink Factory Simulator · C++ backend / JS frontend</p>
    </header>

    <main>
        <!-- ====================================================== -->
        <!-- Simulation Control                                    -->
        <!-- ====================================================== -->
        <section id="sim-control">
            <h2>Simulation Control</h2>

            <div class="row">
                Simulation time:
                <span id="sim-time" class="big">0.00</span> s
            </div>

            <div class="row">
                <button id="btn-pause">Pause</button>
                <button id="btn-reset">Reset</button>
                <label class="speed">
                    Speed
                    <input id="speed" type="range" min="0.1" max="5" step="0.1" value="1">
                    <span id="speed-label">1.0×</span>
                </label>
            </div>

            <h3>Statistics</h3>
            <div id="stats-grid"></div>
        </section>

        <!-- ====================================================== -->
        <!-- Factory (production lines + machines)                 -->
        <!-- ====================================================== -->
        <section id="factory">
            <h2>Factory</h2>
            <div id="factory-content">Loading WebAssembly…</div>
        </section>

        <!-- ====================================================== -->
        <!-- Event log                                             -->
        <!-- ====================================================== -->
        <section id="event-log-section">
            <h2>Event Log</h2>
            <div id="event-log"></div>
        </section>

        <!-- ====================================================== -->
        <!-- Inventory                                             -->
        <!-- ====================================================== -->
        <section id="inventory">
            <h2>Inventory</h2>
            <div id="inventory-content"></div>
        </section>
    </main>

    <!-- 1) Emscripten glue (loads gactorio.wasm and creates `Module`) -->
    <!-- ?v= cache-busts the deployed CDN when we rebuild the wasm. -->
    <script src="gactorio.js?v=20260601d"></script>

    <!-- 2) Our UI logic — talks to Module.Controller only -->
    <script src="app.js?v=20260601d"></script>
</body>
</html>
