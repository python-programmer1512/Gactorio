<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Gactorio - Energy Drink Factory</title>
    <link rel="stylesheet" href="style.css?v=20260614-scenario13">
</head>
<body>
    <header>
        <h1>Gactorio</h1>
        <p>Energy Drink Factory Simulator - C++ backend / JS frontend</p>
    </header>

    <main>
        <section id="sim-control">
            <h2>Simulation Control</h2>

            <div class="row">
                Simulation time:
                <span id="sim-time" class="big">0.00</span> s
            </div>

            <div class="row">
                <button id="btn-pause">Pause</button>
                <button id="btn-reset">Reset</button>
                <label class="speed">
                    Speed
                    <input id="speed" type="range" min="0.1" max="5" step="0.1" value="1">
                    <span id="speed-label">1.0x</span>
                </label>
            </div>

            <h3>Runtime Config</h3>
            <div class="config-actions">
                <button id="btn-load-runtime-config" class="small">Load Runtime Config</button>
                <label class="file-load">
                    <span>Load JSON</span>
                    <input id="config-file-input" type="file" accept=".json,application/json">
                </label>
            </div>
            <div id="config-status" class="config-status" role="status"></div>

            <h3>Memento (Undo / Redo)</h3>
            <div class="row">
                <button id="btn-save">Save Checkpoint</button>
                <button id="btn-undo" disabled>Undo</button>
                <span style="color:#888; font-size:12px; margin-left:8px;">
                    history: <b id="history-size">0</b>
                </span>
            </div>

            <h3>Statistics</h3>
            <div id="stats-grid"></div>

            <h3>Event Log</h3>
            <div id="event-log"></div>
        </section>

        <section id="factory">
            <div class="factory-header">
                <h2>Factory</h2>
                <button id="btn-add-line" class="small">+ Add Line</button>
            </div>
            <div id="factory-content">Loading WebAssembly...</div>
        </section>

        <section id="products">
            <h2>Products</h2>
            <p class="hint">Click to enqueue on the shortest line.</p>
            <div class="product-list"></div>
        </section>

        <section id="inventory">
            <h2>Inventory</h2>
            <div id="inventory-content"></div>
        </section>
    </main>

    <script>
        var Module = {
            locateFile(path) {
                return path.endsWith('.wasm')
                    ? `${path}?v=20260614-scenario13`
                    : path;
            }
        };
    </script>
    <script src="gactorio.js?v=20260614-scenario13"></script>
    <script type="module" src="js/main.js?v=20260614-scenario13"></script>
</body>
</html>
